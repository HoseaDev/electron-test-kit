name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # electron 的 postinstall 要下载二进制，onlyBuiltDependencies 已在
      # package.json 里允许它运行。
      - name: Install
        run: pnpm install --no-frozen-lockfile

      # Linux 上跑 Electron 需要 xvfb 虚拟显示 + 一组系统 GUI 库
      - name: Install xvfb + Electron deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libgtk-3-0

      - name: Typecheck (d.ts consistency)
        run: pnpm typecheck

      - name: Pack check (tarball contents)
        run: pnpm pack:check

      - name: Self-tests (fixture app)
        run: xvfb-run -a pnpm test

      # 验证 npm 打包边界：真 tarball 全新安装后 import + launch
      - name: Pack consumer test (packaging boundary)
        run: xvfb-run -a pnpm pack:consumer

      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
